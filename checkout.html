<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="css/styles.css"> <!-- Link to your CSS file -->
    <script defer src="js/common.js"></script> <!-- Link to any JavaScript file -->
</head>

<body>
    <!-- Header with Navigation Bar -->
    <header class="header">
        <nav class="navbar">
            <div class="logo"><a href="index.html">SafeHouse</a></div>
            <div class="hamburger" onclick="toggleMenu()" id="hamburger">
                <div></div>
                <div></div>
                <div></div>
              </div>
            <ul class="nav-links">
                <li><a href="index.html" data-page="home">Home</a></li>
                <li><a href="store.html" data-page="store">Store</a></li>
                <li><a href="cart.html" data-page="cart">Cart</a></li>
                <li><a href="contact.html" data-page="contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Checkout Container -->
    <div class="checkout-container">
        
        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="step step-1 active">Step 1: Shipping</div>
            <div class="step step-2">Step 2: Payment</div>
            <div class="step step-3">Step 3: Confirmation</div>
        </div>

        <!-- Checkout Form -->
        <div class="checkout-form">
            <h2>Checkout</h2>
            <form id="checkout-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Full Name" required />
                </div>

                <div class="form-group">
                    <label for="address">Shipping Address</label>
                    <input type="text" id="address" name="address" placeholder="Your Address" required />
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Your Email" required />
                </div>

                <!-- Coupon Code -->
                <div class="form-group">
                    <label for="coupon">Coupon Code</label>
                    <input type="text" id="coupon" name="coupon" placeholder="Enter Coupon Code" />
                    <button type="button" id="apply-coupon">Apply</button>
                </div>

                <!-- Payment Section (optional) -->
                <div class="payment-options">
                    <label for="payment-method">Payment Method</label>
                    <select id="payment-method" name="payment-method">
                        <option value="credit-card">Credit/Debit Card</option>
                        <option value="paypal">PayPal</option>
                    </select>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn">Proceed to Payment</button>
            </form>
        </div>

        <!-- Cart Summary -->
        <div class="cart-summary">
            <h3>Cart Summary</h3>
            <p>Total: $XXX.XX</p>
            <button id="checkout-btn">Checkout</button>
        </div>
    </div>

    <!-- Loading Screen -->
<div id="loading-screen" class="loading-screen" style="display: none;">
    <div class="spinner"></div>
    <h2>Processing your order...</h2>
    <p>Please wait while we finalize your purchase.</p>
</div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2024 SafeHouse. All Rights Reserved.</p>
    </footer>

    <script>
        // Example: Applying Coupon
        document.getElementById('apply-coupon').addEventListener('click', function() {
            const couponCode = document.getElementById('coupon').value;
            if (couponCode === 'SAVE10') {
                alert('Coupon applied! You get a 10% discount.');
            } else {
                alert('Invalid coupon code.');
            }
        });

        // Form Submit Simulation
        document.getElementById('checkout-form').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('loading-screen').style.display = 'block';
            setTimeout(function() {
                window.location.href = "thankyou.html";  // Redirect to Thank You page
            }, 3000);  // Simulating a delay of 3 seconds
        });
    </script>
</body>

</html>
