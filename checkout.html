<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Secure Payment Gateway</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        .checkout-layout-container {
            max-width: 600px !important;
            margin: 4rem auto !important;
            padding: 0 1.5rem !important;
            box-sizing: border-box !important;
            width: 100% !important;
        }

        .premium-checkout-card {
            background: #FFFFFF !important;
            border: 1px solid #EAECE8 !important;
            border-radius: 24px !important;
            padding: 3.5rem 3rem !important;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.015) !important;
            box-sizing: border-box !important;
            width: 100% !important;
        }

        .premium-checkout-card h2 {
            font-size: 1.3rem !important;
            font-weight: 700 !important;
            color: #111111 !important;
            margin-bottom: 1.5rem !important;
            border-bottom: 1px solid #F5F5F7 !important;
            padding-bottom: 0.75rem !important;
        }

        .premium-checkout-card .input-group {
            display: flex !important;
            flex-direction: column !important;
            gap: 0.5rem !important;
            margin-bottom: 1.5rem !important;
            width: 100% !important;
        }

        .premium-checkout-card label {
            font-size: 0.75rem !important;
            font-weight: 700 !important;
            text-transform: uppercase !important;
            color: #86868B !important;
            letter-spacing: 0.5px !important;
        }

        .premium-checkout-card input {
            width: 100% !important;
            padding: 0.9rem 1.2rem !important;
            border: 1px solid #EAECE8 !important;
            background-color: #F5F5F7 !important;
            color: #111111 !important;
            font-family: 'Plus Jakarta Sans', sans-serif !important;
            font-size: 0.95rem !important;
            border-radius: 10px !important;
            outline: none !important;
            box-sizing: border-box !important;
            transition: all 0.2s ease !important;
        }

        .premium-checkout-card input:focus {
            border-color: #0071E3 !important;
            background-color: #FFFFFF !important;
            box-shadow: 0 0 0 4px #DDF4FF !important;
        }

        .checkout-grid-row {
            display: grid !important;
            grid-template-columns: 1fr 1fr !important;
            gap: 1.25rem !important;
            width: 100% !important;
        }

        .premium-pay-btn {
            width: 100% !important;
            background-color: #0071E3 !important;
            color: #FFFFFF !important;
            border: none !important;
            padding: 1.1rem !important;
            border-radius: 12px !important;
            font-size: 1rem !important;
            font-weight: 700 !important;
            cursor: pointer !important;
            font-family: 'Plus Jakarta Sans', sans-serif !important;
            transition: all 0.2s ease !important;
            margin-top: 1.5rem !important;
            box-shadow: 0 4px 14px rgba(0, 113, 227, 0.2) !important;
        }

        .premium-pay-btn:hover {
            background-color: #0077ED !important;
            transform: translateY(-1px) !important;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="index.html" class="logo">SafeHouse</a>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="store.html">Store</a>
            <a href="cart.html">Cart</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <div class="checkout-layout-container">
        <h1 class="section-title" style="text-align: left; margin-bottom: 2.5rem;">Secure Checkout</h1>
        
        <div class="premium-checkout-card">
            <form action="#" method="POST">
                <h2>Shipping Details</h2>
                
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Nodo Khutsishvili" required>
                </div>
                
                <div class="input-group">
                    <label>Delivery Address</label>
                    <input type="text" placeholder="Axis Towers, Chavchavadze Ave, Tbilisi" required>
                </div>

                <h2 style="margin-top: 2.5rem;">Payment Method</h2>
                
                <div class="input-group">
                    <label>Card Number</label>
                    <input type="text" placeholder="4000 1234 5678 9010" required>
                </div>

                <div class="checkout-grid-row">
                    <div class="input-group">
                        <label>Expiry Date</label>
                        <input type="text" placeholder="12/29" required>
                    </div>
                    <div class="input-group">
                        <label>CVV/CVC</label>
                        <input type="password" placeholder="•••" maxlength="3" required>
                    </div>
                </div>
                
                <button type="submit" class="premium-pay-btn">Authorize & Finalize Order</button>
            </form>
        </div>
    </div>

    <footer class="app-footer">
        <p>© 2026 SafeHouse. All rights reserved. Future Engineering.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
