<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/common.js"></script>
  <script defer src="js/script.js"></script>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <nav class="navbar">
      <div class="logo"><a href="index.html">SafeHouse</a></div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="store.html">Store</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
        <li><button class="search-trigger" onclick="toggleSearchBar()">Search</button></li>
      </ul>
      <div class="search-bar" id="searchBar" style="display: none;">
        <form onsubmit="handleSearch(event)">
          <input type="text" id="search" placeholder="Search products..." />
          <button type="submit">Search</button>
        </form>
      </div>
    </nav>
  </header>

  <!-- Main Content -->
  <main>
    <section class="contact-section">
      <h1>Contact Us</h1>
      <p>Have a question or just want to say hello? We'd love to hear from you!</p>
      <form id="contact-form">
        <div class="form-group">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" placeholder="Your Name" required>
        </div>
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" placeholder="Your Email" required>
        </div>
        <div class="form-group">
          <label for="subject">Subject:</label>
          <input type="text" id="subject" name="subject" placeholder="Subject">
        </div>
        <div class="form-group">
          <label for="message">Message:</label>
          <textarea id="message" name="message" placeholder="Your Message" rows="5" required></textarea>
        </div>
        <button type="submit" aria-label="Send message">Send Message</button>
      </form>
      <div id="form-response" style="display: none;"></div>
      
      <!-- Map -->
      <div class="contact-map">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d29313.330067905197!2d44.7405822!3d41.7234944!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x40447311c5a4fd2d%3A0xb51a5da2ec2d9d2a!2z4YOh4YOY4YOX4YOYIOGDm-GDneGDmuGDmA!5e1!3m2!1sen!2sge!4v1732277459456!5m2!1sen!2sge"
          width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
          aria-label="Google Map of location"></iframe>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2024 Your Company. All Rights Reserved.</p>
  </footer>
</body>
</html>
