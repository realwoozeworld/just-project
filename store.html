<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Page</title>
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/common.js"></script>
  <script defer src="js/store.js"></script>
  <script defer src="js/script.js"></script>
  <script defer src="js/search.js"></script>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <nav class="navbar">
      <div class="logo"><a href="index.html">SafeHouse</a></div>
      <div class="hamburger" onclick="toggleMenu()" id="hamburger">
        <div></div>
        <div></div>
        <div></div>
      </div>
      <ul class="nav-links">
        <li><a href="index.html" data-page="home">Home</a></li>
        <li><a href="store.html" data-page="store" aria-current="page" class="active">Store</a></li>
        <li><a href="cart.html" data-page="cart">Cart</a></li>
        <li><a href="contact.html" data-page="contact">Contact</a></li>
        <li><button class="search-trigger" onclick="toggleSearchBar()">Search</button></li>
        <li id="userMenu">
          <span id="userNickname" onclick="toggleDropdown()">Nickname</span>
          <div class="dropdown-menu" id="dropdownMenu">
            <a href="profile.html">Profile</a>
            <a href="settings.html">Settings</a>
            <a href="#" id="logoutLink">Logout</a>
          </div>
        </li>
      </ul>
      <div class="search-bar" id="searchBar">
        <input type="text" id="search" placeholder="Search products..." />
        <button type="submit">Search</button>
      </div>
    </nav>
  </header>

  <!-- Main Content -->
  <main>
    <section class="store-wrapper">
      <!-- Filters Section -->
      <aside class="filter-section">
        <h3>Filters</h3>
        <form id="filter-form">
          <!-- Category Filter -->
          <div class="filter-group">
            <label for="category">Category:</label>
            <select id="category" name="category">
              <option value="">All Categories</option>
              <option value="electronics">Electronics</option>
              <option value="fashion">Fashion</option>
              <option value="home">Home & Living</option>
            </select>
          </div>
  
          <!-- Price Range Filter -->
          <div class="filter-group">
            <label for="price-range">Price Range:</label>
            <input type="number" id="min-price" name="min-price" placeholder="Min Price">
            <input type="number" id="max-price" name="max-price" placeholder="Max Price">
          </div>
  
          <!-- Ratings Filter -->
          <div class="filter-group">
            <label for="ratings">Ratings:</label>
            <select id="ratings" name="ratings">
              <option value="">All Ratings</option>
              <option value="4">4 stars & up</option>
              <option value="3">3 stars & up</option>
              <option value="2">2 stars & up</option>
            </select>
          </div>
  
          <button type="submit" class="filter-btn">Apply Filters</button>
        </form>
      </aside>
  
      <!-- Store Section -->
      <section class="store-section">
        <h1>Our Products</h1>
        <div id="product-container">
          <!-- Products will be dynamically inserted here -->
          <p>Loading products, please wait...</p>
        </div>
      </section>
    </section>
  </main>
  

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2024 SafeHouse. All rights reserved.</p>
  </footer>
</body>
</html>
