<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart</title>
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/common.js"></script> <!-- Common functionality -->
  <script defer src="js/cart.js"></script> <!-- Cart-specific script -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <nav class="navbar">
      <div class="logo"><a href="index.html">SafeHouse</a></div>
      <div class="hamburger" id="hamburger">
        <div></div>
        <div></div>
        <div></div>
      </div>
      <ul class="nav-links">
        <li><a href="index.html" data-page="home">Home</a></li>
        <li><a href="store.html" data-page="store">Store</a></li>
        <li><a href="cart.html" data-page="cart" aria-current="page" class="active">Cart</a></li>
        <li><a href="contact.html" data-page="contact">Contact</a></li>
        <li><button class="search-trigger" onclick="toggleSearchBar()">Search</button></li>
        <li><button id="loginButton">Login</button></li>
        <li><button id="logoutButton" style="display: none;">Logout</button></li>
      </ul>
      <div class="search-bar" id="searchBar">
        <input type="text" id="search" placeholder="Search products..." />
        <button type="submit">Search</button>
      </div>
    </nav>
  </header>

  <main>
    <section class="cart-section">
      <h1>Your Cart</h1>
      <div id="cart-container"></div> <!-- Cart items will appear here -->
      <div id="cart-total"></div> <!-- Cart total will appear here -->
      <button id="checkout-btn" class="checkout-btn">Proceed to Checkout</button> <!-- Checkout button -->
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2024 MyStore. All rights reserved.</p>
  </footer>
</body>
</html>
