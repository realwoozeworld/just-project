<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart</title>
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/common.js"></script> <!-- Common functionality -->
  <script defer src="js/cart.js"></script> <!-- Cart-specific script -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <header class="header">
    <div class="navbar">
      <div class="logo">SafeHouse</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="store.html">Store</a></li>
        <li><a href="cart.html" class="active">Cart</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><button class="search-trigger" onclick="toggleSearchBar()">Search</button></li>
        <li><button id="logoutButton">Logout</button></li>

      </ul>
      <div class="search-bar" id="searchBar" style="display: none;">
        <form onsubmit="handleSearch(event)">
          <input type="text" id="search" placeholder="Search products..." />
          <button type="submit">Search</button>
        </form>
      </div>
    </div>
  </header>

  <main>
    <section class="cart-section">
      <h1>Your Cart</h1>
      <div id="cart-container"></div> <!-- Cart items will appear here -->
      <div id="cart-total"></div> <!-- Cart total will appear here -->
      <button id="checkout-btn" class="checkout-btn">Proceed to Checkout</button> <!-- Checkout button -->
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2024 MyStore. All rights reserved.</p>
  </footer>
</body>
</html>
